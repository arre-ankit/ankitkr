<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">

  <!-- Background -->
  <rect width="200" height="200" fill="#0a0a0a"/>

  <!-- Outer dashed border -->
  <rect x="10" y="10" width="180" height="180" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="4 5" opacity="0.15"/>

  <!-- Corner ticks TL -->
  <line x1="10" y1="10" x2="30" y2="10" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
  <line x1="10" y1="10" x2="10" y2="30" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>

  <!-- Corner ticks TR -->
  <line x1="190" y1="10" x2="170" y2="10" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
  <line x1="190" y1="10" x2="190" y2="30" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>

  <!-- Corner ticks BL -->
  <line x1="10" y1="190" x2="30" y2="190" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
  <line x1="10" y1="190" x2="10" y2="170" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>

  <!-- Corner ticks BR -->
  <line x1="190" y1="190" x2="170" y2="190" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
  <line x1="190" y1="190" x2="190" y2="170" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>

  <!-- Wrench icon centered -->
  <g transform="translate(100, 88) scale(2.8)">
    <path d="M 5.35 -8.5 a 1 1 0 0 0 0 1.4 l 1.6 1.6 a 1 1 0 0 0 1.4 0 l 3.77 -3.77 a 6 6 0 0 1 -7.94 7.94 l -6.91 6.91 a 2.12 2.12 0 0 1 -3 -3 l 6.91 -6.91 a 6 6 0 0 1 7.94 -7.94 l -3.76 3.76 z"
      fill="none" stroke="#a78bfa" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="100" y="148" font-family="monospace" font-size="13" fill="#ffffff" font-weight="700" letter-spacing="3" text-anchor="middle">TOOL CALL</text>

  <!-- Tagline -->
  <text x="100" y="166" font-family="monospace" font-size="7" fill="#a78bfa" letter-spacing="2" text-anchor="middle" opacity="0.7">BY ANKIT KUMAR</text>

</svg>
